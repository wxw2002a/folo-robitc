<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Prototype enclosure design layout</title>
  <desc id="desc">Four-view technical overview showing front, side, top and internal layout with key dimensions and labels.</desc>
  <defs>
    <style>
      .bg{fill:#eef1f6}
      .card{fill:#ffffff;stroke:#c8d0df;stroke-width:2}
      .device{fill:#3f4652;stroke:#242a33;stroke-width:3}
      .panel{fill:#1d222b}
      .panel2{fill:#5e6675}
      .line{stroke:#2a3342;stroke-width:2;fill:none;stroke-linecap:round}
      .dim{stroke:#2a3342;stroke-width:2;fill:none;marker-start:url(#arrow);marker-end:url(#arrow)}
      .dot{fill:#2a3342}
      .label{font-family:Arial,sans-serif;font-size:28px;fill:#101726;font-weight:700}
      .sub{font-family:Arial,sans-serif;font-size:24px;fill:#101726}
      .tiny{font-family:Arial,sans-serif;font-size:21px;fill:#2a3342}
      .title{font-family:Arial,sans-serif;font-size:36px;fill:#101726;font-weight:700}
      .mm{font-family:Arial,sans-serif;font-size:30px;fill:#101726;font-weight:700}
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 z" fill="#2a3342"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1100"/>

  <g transform="translate(90,80)">
    <rect class="card" x="0" y="0" width="690" height="450" rx="20"/>
    <rect class="device" x="180" y="85" width="330" height="285" rx="14"/>
    <circle cx="336" cy="145" r="28" fill="#0f151e" stroke="#5d6c88" stroke-width="3"/>
    <rect class="panel" x="220" y="185" width="250" height="40" rx="6"/>
    <rect x="220" y="245" width="250" height="65" rx="8" fill="#10151d" stroke="#7b8496" stroke-width="2"/>
    <rect class="panel2" x="200" y="312" width="290" height="45" rx="6"/>

    <line class="dim" x1="180" y1="45" x2="510" y2="45"/>
    <text class="mm" x="309" y="30">120 mm</text>
    <line class="dim" x1="130" y1="85" x2="130" y2="370"/>
    <text class="mm" x="65" y="232" transform="rotate(-90 65,232)">140 mm</text>

    <circle class="dot" cx="410" cy="145" r="5"/>
    <line class="line" x1="415" y1="145" x2="560" y2="145"/>
    <text class="tiny" x="570" y="151">Microphone</text>

    <circle class="dot" cx="410" cy="202" r="5"/>
    <line class="line" x1="415" y1="202" x2="560" y2="202"/>
    <text class="tiny" x="570" y="208">Speaker Grills</text>

    <circle class="dot" cx="410" cy="277" r="5"/>
    <line class="line" x1="415" y1="277" x2="560" y2="277"/>
    <text class="tiny" x="570" y="283">Display Area</text>

    <text class="label" x="280" y="420">Front View</text>
  </g>

  <g transform="translate(820,80)">
    <rect class="card" x="0" y="0" width="690" height="450" rx="20"/>
    <rect class="device" x="225" y="95" width="245" height="280" rx="14"/>
    <rect x="270" y="145" width="155" height="78" rx="8" fill="#d4dae4" stroke="#424c5e" stroke-width="2"/>
    <rect class="panel" x="295" y="172" width="75" height="24" rx="4"/>
    <rect class="panel2" x="255" y="250" width="185" height="95" rx="6"/>

    <line class="dim" x1="225" y1="58" x2="470" y2="58"/>
    <text class="mm" x="308" y="42">100 mm</text>
    <line class="dim" x1="520" y1="95" x2="520" y2="375"/>
    <text class="mm" x="575" y="245" transform="rotate(90 575,245)">100 mm</text>

    <circle class="dot" cx="295" cy="152" r="5"/>
    <line class="line" x1="290" y1="152" x2="145" y2="152"/>
    <text class="tiny" x="18" y="158">USB Port</text>

    <circle class="dot" cx="295" cy="185" r="5"/>
    <line class="line" x1="290" y1="185" x2="145" y2="185"/>
    <text class="tiny" x="12" y="191">Power Switch</text>

    <circle class="dot" cx="290" cy="250" r="5"/>
    <line class="line" x1="285" y1="250" x2="145" y2="250"/>
    <text class="tiny" x="12" y="256">Cooling Vents</text>

    <circle class="dot" cx="282" cy="318" r="5"/>
    <line class="line" x1="277" y1="318" x2="145" y2="318"/>
    <text class="tiny" x="12" y="324">Battery Compartment</text>

    <text class="label" x="303" y="420">Side View</text>
  </g>

  <g transform="translate(90,560)">
    <rect class="card" x="0" y="0" width="690" height="450" rx="20"/>
    <rect class="device" x="180" y="90" width="330" height="280" rx="14"/>
    <rect class="panel" x="230" y="120" width="230" height="32" rx="6"/>
    <circle cx="278" cy="202" r="8" fill="#50d26b"/>
    <circle cx="336" cy="202" r="8" fill="#f45252"/>
    <circle cx="394" cy="202" r="8" fill="#f0c249"/>

    <line class="dim" x1="180" y1="50" x2="510" y2="50"/>
    <text class="mm" x="309" y="34">120 mm</text>
    <line class="dim" x1="130" y1="90" x2="130" y2="370"/>
    <text class="mm" x="65" y="235" transform="rotate(-90 65,235)">120 mm</text>

    <circle class="dot" cx="450" cy="130" r="5"/>
    <line class="line" x1="455" y1="130" x2="560" y2="130"/>
    <text class="tiny" x="570" y="136">Antenna Mount</text>

    <circle class="dot" cx="390" cy="202" r="5"/>
    <line class="line" x1="395" y1="202" x2="560" y2="202"/>
    <text class="tiny" x="570" y="208">Status LEDs</text>

    <circle class="dot" cx="444" cy="290" r="5"/>
    <line class="line" x1="449" y1="290" x2="560" y2="290"/>
    <text class="tiny" x="570" y="296">Mounting Holes</text>

    <text class="label" x="294" y="420">Top View</text>
  </g>

  <g transform="translate(820,560)">
    <rect class="card" x="0" y="0" width="690" height="450" rx="20"/>
    <rect class="device" x="210" y="95" width="275" height="275" rx="14"/>
    <rect x="242" y="130" width="160" height="52" rx="6" fill="#2c6fc3"/>
    <rect x="250" y="196" width="170" height="52" rx="6" fill="#3f8e41"/>
    <rect x="260" y="260" width="165" height="50" rx="6" fill="#565f71"/>
    <rect x="255" y="322" width="172" height="36" rx="6" fill="#1a1f27"/>
    <circle cx="448" cy="152" r="30" fill="#1d232c" stroke="#6c778d" stroke-width="2"/>

    <line class="dim" x1="210" y1="60" x2="485" y2="60"/>
    <text class="mm" x="322" y="43">60 mm</text>
    <line class="dim" x1="165" y1="95" x2="165" y2="245"/>
    <text class="mm" x="125" y="180" transform="rotate(-90 125,180)">50 mm</text>
    <line class="dim" x1="535" y1="95" x2="535" y2="370"/>
    <text class="mm" x="575" y="240" transform="rotate(90 575,240)">60 mm</text>

    <text class="sub" x="278" y="163" fill="#f4f8ff">Arduino Board</text>
    <text class="sub" x="282" y="229" fill="#f5fff5">LLM Module</text>
    <text class="sub" x="304" y="293" fill="#ecf0fa">Speaker</text>
    <text class="sub" x="280" y="349" fill="#dce4f4">Li-ion Battery</text>

    <text class="label" x="263" y="420">Internal Layout</text>
  </g>
</svg>
